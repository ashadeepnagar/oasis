<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caffeine Oasis</title>
  <link rel="icon" type="image/jpg" href="/assets/images/logo/logo-done.jpg">
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen relative text-base sm:text-lg leading-relaxed">

  <div class="grain-overlay"></div>

  <!-- Navbar – now with correct links -->
  <nav class="fixed top-0 w-full bg-[#1F1717]/90 backdrop-blur-md z-50 border-b border-amber-900/30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fas fa-coffee text-3xl text-amber-500"></i>
        <span class="text-2xl font-bold tracking-tight">Caffeine Oasis</span>
      </div>
      
      <!-- Desktop menu -->
      <div class="hidden md:flex items-center gap-14">
        <a href="/" class="hover:text-amber-400 transition">Home</a>
        <a href="/menu/" class="hover:text-amber-400 transition">Menu</a>
        <a href="/thevibe/" class="hover:text-amber-400 transition">The Vibe</a>
        <a href="/visit/" class="hover:text-amber-400 transition">Visit</a>
        
      </div>

      <!-- Cart icon -->
      <button id="cart-toggle" class="relative text-amber-400 hover:text-amber-300 transition focus:outline-none">
        <i class="fas fa-shopping-cart text-2xl sm:text-3xl"></i>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
      </button>

      <!-- Mobile menu button -->
      <button id="mobile-menu-btn" class="md:hidden text-amber-400 focus:outline-none">
        <i class="fas fa-bars text-3xl"></i>
      </button>
    </div>

    <!-- Mobile menu dropdown -->
    <div id="mobile-menu" class="hidden md:hidden bg-[#1F1717]/95 backdrop-blur-md border-t border-amber-900/30">
      <div class="px-4 py-6 flex flex-col gap-6 text-center text-lg">
        <a href="/" class="hover:text-amber-400 transition">Home</a>
        <a href="/menu/" class="hover:text-amber-400 transition">Menu</a>
        <a href="/thevibe/" class="hover:text-amber-400 transition">The Vibe</a>
        <a href="/visit/" class="hover:text-amber-400 transition">Visit</a>
        <a href="/cart/" class="hover:text-amber-400 transition">Cart</a>
      </div>
    </div>
  </nav>

  <section id="home" class="hero-bg min-h-screen flex items-center pt-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid md:grid-cols-2 gap-12 items-center">
      <div class="space-y-8">
        <!-- Logo image here -->
        <img 
          src="/assets/images/logo/logo-done.png" 
          alt="Caffeine Oasis Logo" 
          class="h-16 sm:h-20 md:h-24 w-auto mb-4 md:mb-6"
          loading="lazy">
        <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold leading-tight">
          CKB's Coolest<br>
          <span class="bg-gradient-to-r from-black to-gray-900 bg-clip-text text-transparent">Caffeine Hideout</span>
        </h1>
        <p class="text-xl text-gray-500 max-w-lg">
          Obsessed with bold brews, cozy corners, and playlists that hit different. Your daily escape in the heart of CKB.
        </p>
        <div class="flex flex-wrap gap-4">
          <a href="/menu" class="bg-amber-600 hover:bg-amber-500 px-8 py-5 rounded-xl font-semibold transition text-base sm:text-lg">Explore Menu</a>
          <a href="/visit" class="border border-amber-500/70 hover:bg-amber-500/10 px-8 py-4 rounded-xl font-semibold transition">Find Us</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-12 text-center text-gray-500 border-t border-amber-900/20">
    <p>Made with obsession in CKB • © 2026 Caffeine Oasis</p>
  </footer>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/917062214305?text=Hi%20Caffeine%20Oasis!%20I%20want%20to%20order..." target="_blank" 
     class="fixed bottom-6 right-6 bg-green-600 hover:bg-green-500 text-white p-4 rounded-full shadow-2xl z-50 transition">
    <i class="fab fa-whatsapp text-3xl"></i>
  </a>

  <!-- Shared JavaScript -->
  <script src="/assets/js/background.js"></script>
  <script src="/assets/js/script.js"></script>
  
</body>
</html>
